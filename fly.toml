# fly.toml — la-keys on Fly.io with a persistent volume backing SQLite.
#
# Deploy from this directory:
#   flyctl apps create la-keys
#   flyctl volumes create la_keys_data --region iad --size 1
#   flyctl secrets set \
#       LARC_ENV=production \
#       LARC_HMAC_PEPPER="$(openssl rand -hex 32)" \
#       LARC_JWT_SECRET="$(openssl rand -hex 32)"
#   flyctl deploy
#
# Bootstrap the first admin (one-shot, via `flyctl ssh console`):
#   flyctl ssh console -a la-keys
#   /app/la-keys create-admin --email kft@lightarchitects.io
#
# Once Fly health checks are green, point DNS for keys.lightarchitects.ai at
# Fly's anycast (see `flyctl ips list`).

app = "la-keys"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "info"
  # Database lives on the mounted volume (matches Dockerfile ENV).
  LARC_DATABASE_PATH = "/data/larc.db"
  LARC_HOST = "0.0.0.0"
  LARC_PORT = "3800"
  LARC_ENV = "production"

# Persistent volume — backs SQLite so the database survives VM restarts and
# redeploys.  Single-machine semantics; do NOT scale machines >1 against a
# single volume (SQLite is single-writer).
[mounts]
  source = "la_keys_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 3800
  force_https = true
  # auto_stop is disabled so the volume-backed VM stays alive — restarting
  # a SQLite-backed machine from cold has a 5–10s WAL replay penalty we
  # don't want on the auth hot path.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 75

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
